$schema: https://json-schema.org/draft/2020-12/schema
$id: https://jin-gizmo.github.io/req/req.schema.yaml
documentation: https://jin-gizmo.github.io/req

title: "Req (JinReq) Requirements Specification"
description: "Schema for req (JinReq) requirements specification files"

type: object
required:
  - name
  - require

patternProperties:
  '^\$schema$':
    type: string

additionalProperties: false

properties:
  # --------------------
  name:
    $ref: '#/$defs/NonEmptyString'
    description: "A short name for the requirements set."

  description:
    $ref: '#/$defs/NonEmptyString'
    description: "A short name for the requirements set."

  # --------------------
  template:
    type: object
    additionalProperties: false
    required:
      - requirement
    properties:
      prologue:
        description: "String printed first in generated documentation"
        $ref: '#/$defs/NonEmptyString'
      requirement:
        description: "String printed for each requirement in generated documentation"
        $ref: '#/$defs/NonEmptyString'
      epilogue:
        description: "String printed last in generated documentation"
        $ref: '#/$defs/NonEmptyString'

  # --------------------
  require:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - name
        - check
      properties:
        check:
          description: "A bash script that determines if the requirement is already fulfilled"
          $ref: '#/$defs/NonEmptyString'
        description:
          description: "A description for the requirement"
          $ref: '#/$defs/NonEmptyString'
        if:
          description: "A bash script that determines of the requirement applies"
          $ref: '#/$defs/NonEmptyString'
        install:
          description: "A bash script that does whatever is necessary to fulfil the requirement"
          $ref: '#/$defs/NonEmptyString'
        name:
          description: "Name of the requirement"
          $ref: '#/$defs/NonEmptyString'
        optional:
          type: boolean
          description: "Whether or not the requirement is optional"
          default: false

# ------------------------------------------------------------------------------
$defs:
  NonEmptyString:
    type: string
    minLength: 1
